<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>🧙 Magiczna Gra</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f4f0ff; }
        h1 { color: #4a2c8f; }
        select, button { padding: 10px; margin: 10px 0; font-size: 16px; }
        button { background: #4a2c8f; color: white; border: none; cursor: pointer; padding: 12px 20px; }
        button:hover { background: #6b4ab3; }
        .wynik { margin-top: 30px; padding: 20px; background: white; border: 3px solid #4a2c8f; border-radius: 10px; }
        .gomez { color: #d63031; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

    <h1>🧙 Magiczna Gra</h1>

    <h2>📖 Księga Zaklęć</h2>
    <select id="zaklecie">
        <option value="">-- wybierz zaklęcie --</option>
        <option value="grom">Grom</option>
        <option value="blyskawica">Błyskawica</option>
        <option value="kula ognia">Kula Ognia</option>
    </select>

    <br><br>

    <h2>⚔️ Broń Biała</h2>
    <select id="bron_biala">
        <option value="">-- wybierz broń białą --</option>
        <option value="miecz">Miecz</option>
        <option value="topor">Topór</option>
        <option value="nadziak">Nadziejak</option>
    </select>

    <br><br>

    <h2>🏹 Broń Dystansowa</h2>
    <select id="bron_dystansowa">
        <option value="">-- wybierz broń dystansową --</option>
        <option value="kusza">Kusza</option>
        <option value="luk">Łuk</option>
        <option value="oszczep">Oszczep</option>
    </select>

    <br><br>

    <button onclick="zatwierdz()">Zatwierdź wybór</button>

    <div class="wynik" id="wynik"></div>

    <script>
        function zatwierdz() {
            let zaklecie = document.getElementById("zaklecie").value;
            let bron_biala = document.getElementById("bron_biala").value;
            let bron_dystansowa = document.getElementById("bron_dystansowa").value;

            let wynik = document.getElementById("wynik");
            let tekst = "";

            tekst += "<p class='gomez'>GOMEZ!</p>";

            if (zaklecie) {
                tekst += `<h3>Zaklęcie: ${zaklecie.toUpperCase()}</h3>`;
                if (zaklecie === "grom") {
                    tekst += "<p>Użyłeś prostego zaklęcia <strong>Grom</strong>, które zadaje <strong>25 pkt obrażeń</strong>.</p>";
                } else if (zaklecie === "blyskawica") {
                    tekst += "<p>Użyłeś średniozaawansowanego zaklęcia <strong>Błyskawica</strong>, które zadaje <strong>35 pkt obrażeń</strong>.</p>";
                } else if (zaklecie === "kula ognia") {
                    tekst += "<p>Wybrałeś zaawansowane zaklęcie <strong>Kula Ognia</strong> ze szkoły magii ognia, które zadaje <strong>60 pkt obrażeń</strong>.</p>";
                }
            }

            if (bron_biala) {
                tekst += `<h3>Broń Biała: ${bron_biala}</h3>`;
                if (bron_biala === "miecz") {
                    tekst += "<p>Wybrałeś broń sieczną - zadajesz <strong>25 pkt obrażeń siecznych</strong>.</p>";
                } else if (bron_biala === "topor") {
                    tekst += "<p>Wybrałeś broń obuchowo-sieczną - zadajesz <strong>40 pkt obrażeń</strong>.</p>";
                } else if (bron_biala === "nadziak") {
                    tekst += "<p>Wybrałeś broń obuchowo-kolną - zadajesz <strong>35 pkt obrażeń</strong>.</p>";
                }
            }

            if (bron_dystansowa) {
                tekst += `<h3>Broń Dystansowa: ${bron_dystansowa}</h3>`;
                if (bron_dystansowa === "kusza") {
                    tekst += "<p>Wybrałeś kuszę - zadaje <strong>45 pkt obrażeń</strong>.</p>";
                } else if (bron_dystansowa === "luk") {
                    tekst += "<p>Wybrałeś łuk - zadaje <strong>35 pkt obrażeń</strong>.</p>";
                } else if (bron_dystansowa === "oszczep") {
                    tekst += "<p>Wybrałeś oszczep - zadaje <strong>30 pkt obrażeń</strong>.</p>";
                }
            }

            if (!zaklecie && !bron_biala && !bron_dystansowa) {
                tekst = "<p style='color:red;'>Nie wybrałeś żadnego zaklęcia ani broni!</p>";
            }

            wynik.innerHTML = tekst;
        }
    </script>

</body>
</html>
